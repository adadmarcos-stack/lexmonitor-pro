<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LexMonitor PRO - Login</title>
<style>
:root {
  --bg1:#09111f; --bg2:#0f1728; --panel:rgba(17,28,48,.52); --line:rgba(255,255,255,.14);
  --text:#eaf1ff; --muted:#98a9c8; --accent:#52a8ff; --danger:#ff7b7b; --shadow:0 20px 50px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(82,168,255,.18), transparent 32%),
    linear-gradient(160deg, var(--bg1), var(--bg2));
  color:var(--text); display:grid; place-items:center; padding:24px;
}
.card{
  width:min(100%,420px); padding:28px; border-radius:24px; background:var(--panel);
  backdrop-filter: blur(18px); border:1px solid var(--line); box-shadow:var(--shadow);
}
.title{font-size:30px;font-weight:800;margin:0 0 6px}
.sub{color:var(--muted);margin:0 0 22px}
.label{display:block;font-size:13px;color:var(--muted);margin:0 0 8px}
.input{
  width:100%; padding:14px 16px; border-radius:16px; border:1px solid var(--line);
  background:rgba(255,255,255,.06); color:var(--text); outline:none; font-size:16px; margin-bottom:14px;
}
.input[readonly]{opacity:.8}
.btn{
  width:100%; padding:14px 16px; border:none; border-radius:16px; background:var(--accent); color:#fff;
  font-size:16px; font-weight:800; cursor:pointer;
}
.err{margin-bottom:12px;color:var(--danger);font-size:14px}
</style>
</head>
<body>
  <form class="card" method="post">
    <h1 class="title">LexMonitor PRO</h1>
    <p class="sub">Acesso protegido ao painel jurídico.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label class="label">E-mail</label>
    <input class="input" type="email" name="email" value="{{ login_email }}" readonly>
    <label class="label">Senha</label>
    <input class="input" type="password" name="password" placeholder="Digite sua senha" required>
    <button class="btn" type="submit">Entrar</button>
  </form>
</body>
</html>
